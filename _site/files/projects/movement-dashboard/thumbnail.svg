<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#4a90a4"/>
    </linearGradient>
    <linearGradient id="chart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4a90a4;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="50" y1="50" x2="50" y2="250"/>
    <line x1="100" y1="50" x2="100" y2="250"/>
    <line x1="150" y1="50" x2="150" y2="250"/>
    <line x1="200" y1="50" x2="200" y2="250"/>
    <line x1="50" y1="100" x2="350" y2="100"/>
    <line x1="50" y1="150" x2="350" y2="150"/>
    <line x1="50" y1="200" x2="350" y2="200"/>
  </g>

  <!-- Skeleton figure -->
  <g stroke="#e74c3c" stroke-width="3" fill="none">
    <!-- Shoulders -->
    <line x1="260" y1="100" x2="310" y2="100"/>
    <!-- Left arm -->
    <line x1="260" y1="100" x2="240" y2="140"/>
    <line x1="240" y1="140" x2="220" y2="180"/>
    <!-- Right arm -->
    <line x1="310" y1="100" x2="340" y2="130"/>
    <line x1="340" y1="130" x2="360" y2="110"/>
  </g>

  <!-- Joints -->
  <g fill="#2ecc71">
    <circle cx="260" cy="100" r="6"/>
    <circle cx="310" cy="100" r="6"/>
    <circle cx="240" cy="140" r="5"/>
    <circle cx="220" cy="180" r="5"/>
    <circle cx="340" cy="130" r="5"/>
    <circle cx="360" cy="110" r="5"/>
  </g>

  <!-- Movement chart area -->
  <path d="M50,220 Q80,180 110,200 T170,160 T230,190 T290,140 T350,180 L350,250 L50,250 Z" fill="url(#chart)"/>
  <path d="M50,220 Q80,180 110,200 T170,160 T230,190 T290,140 T350,180" stroke="#4a90a4" stroke-width="2" fill="none"/>

  <!-- Data points -->
  <g fill="white">
    <circle cx="50" cy="220" r="3"/>
    <circle cx="110" cy="200" r="3"/>
    <circle cx="170" cy="160" r="3"/>
    <circle cx="230" cy="190" r="3"/>
    <circle cx="290" cy="140" r="3"/>
    <circle cx="350" cy="180" r="3"/>
  </g>

  <!-- Title -->
  <text x="200" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Movement Analysis Dashboard</text>

  <!-- Labels -->
  <text x="285" y="80" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Pose Tracking</text>
  <text x="200" y="270" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">Movement Timeline</text>
</svg>
